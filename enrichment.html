<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cleveland Neighborhoods — Enrichment (Staff)</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0; padding: 0;
      background: #2A2620;
      font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #1A1814;
    }
    #root { min-height: 100vh; }
    /* Force textareas/inputs to look quiet — only outline on focus */
    textarea:focus, input:focus, select:focus {
      border-color: #1F5963 !important;
      box-shadow: 0 0 0 3px rgba(31,89,99,0.12);
    }
  </style>

  <!-- React -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Canvas + shell -->
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="staff-shell.jsx"></script>

  <!-- Screens -->
  <script type="text/babel" src="staff-home.jsx"></script>
  <script type="text/babel" src="staff-record-edit.jsx"></script>
  <script type="text/babel" src="staff-photos-list.jsx"></script>
  <script type="text/babel" src="staff-story-author.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    function App() {
      return (
        <DesignCanvas>
          <DCSection
            id="enrichment-system"
            title="Enrichment Interface — Library-facing"
            subtitle={`Staff-only tool for enriching ContentDM records, authoring stories, and moderating contributions. Mirrors the public site (oldcleveland.org) but skews utilitarian, dense, keyboard-first. Four highest-leverage screens of the IA mocked here.`}
          >
            <DCArtboard id="staff-home" label="01 · Home & worklists — Brian's entry point" width={1440} height={900}>
              <StaffShell
                activeSection="home"
                screenTitle="Home"
                screenMeta="WELCOME · BRIAN MEGGITT"
              >
                <StaffHome />
              </StaffShell>
            </DCArtboard>

            <DCArtboard id="staff-record-edit" label="02 · Record edit — the heart of the tool (80% of work)" width={1600} height={920}>
              <StaffShell
                activeSection="photos"
                screenTitle="cpl_011_4738.tif"
                screenMeta="EDIT · TREMONT WORKLIST"
              >
                <StaffRecordEdit />
              </StaffShell>
            </DCArtboard>

            <DCArtboard id="staff-photos-list" label="03 · Photos · spreadsheet mode (bulk-edit + saved views)" width={1600} height={900}>
              <StaffShell
                activeSection="photos"
                screenTitle="Photos"
                screenMeta="22 MATCHING · TREMONT · MISSING GEO"
              >
                <StaffPhotosList />
              </StaffShell>
            </DCArtboard>

            <DCArtboard id="staff-story-author" label="04 · Story authoring — sequence editor, co-author comments, preview-as-patron" width={1600} height={920}>
              <StaffShell
                activeSection="stories"
                screenTitle="Streetcars of Detroit Avenue"
                screenMeta="DRAFT · CO-AUTHORED"
              >
                <StaffStoryAuthor />
              </StaffShell>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
