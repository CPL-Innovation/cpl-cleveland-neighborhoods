<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cleveland Neighborhoods — Landing</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0; padding: 0;
      background: #2A2620;
      font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #1A1814;
    }
    #root { min-height: 100vh; }
  </style>

  <!-- React -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Frames + canvas -->
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="browser-window.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>

  <!-- App components -->
  <script type="text/babel" src="cleveland-map.jsx"></script>
  <script type="text/babel" src="mobile-landing.jsx"></script>
  <script type="text/babel" src="mobile-photo-detail.jsx"></script>
  <script type="text/babel" src="desktop-landing.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    function App() {
      return (
        <DesignCanvas>
          <DCSection
            id="landing"
            title="Cleveland Neighborhoods — Landing"
            subtitle={`Editorial newsroom meets archival map. Mobile-first per spec; desktop and mobile-detail companion the landing screen.`}
          >
            <DCArtboard id="mobile-landing" label="Mobile · landing" width={402} height={874}>
              <MobileLanding />
            </DCArtboard>

            <DCArtboard id="mobile-detail" label="Mobile · photo detail" width={402} height={874}>
              <MobilePhotoDetail />
            </DCArtboard>

            <DCArtboard id="desktop-landing" label="Desktop · landing" width={1280} height={832}>
              <ChromeWindow
                width={1280}
                height={832}
                tabs={[{ title: 'Cleveland Neighborhoods' }, { title: 'CPL · Catalog' }]}
                activeIndex={0}
                url="oldcleveland.org"
              >
                <DesktopLanding />
              </ChromeWindow>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
