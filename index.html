<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cleveland Neighborhoods — A century of Cleveland, mapped to the corner</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <style>
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      background: #F6F2EB;
      font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #1A1814;
    }
    #root { height: 100vh; width: 100vw; }

    /* Leaflet container blends with the cream paper background.
       isolation: isolate caps the inner pane z-indexes (up to 700) inside
       this container's stacking context, so app overlays sit cleanly on top. */
    .leaflet-container {
      background: #F1ECE2;
      font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      outline: none;
      position: relative;
      z-index: 0;
      isolation: isolate;
    }
    /* Subtle warm tone on the otherwise grey-blue Positron tiles. */
    .leaflet-tile-pane { filter: sepia(0.18) saturate(0.85) hue-rotate(-6deg) brightness(1.02); }

    .leaflet-control-attribution {
      background: rgba(246, 242, 235, 0.78) !important;
      backdrop-filter: blur(6px);
      font-family: 'JetBrains Mono', ui-monospace, monospace !important;
      font-size: 10px !important;
      color: #6B6359 !important;
      padding: 2px 8px !important;
      border-radius: 4px 0 0 0;
    }
    .leaflet-control-attribution a { color: #1F5963 !important; }

    /* ── Photo dots — div-icon markers, styled in CSS ──────────── */
    .leaflet-div-icon, .cm-dot-wrap {
      background: transparent !important;
      border: none !important;
    }
    .cm-dot {
      width: 22px; height: 22px;
      display: grid; place-items: center;
      position: relative;
      cursor: pointer;
      color: #A8362B;
      will-change: transform;
    }
    .cm-dot--featured { color: #C8983A; }
    .cm-dot--dim {
      color: #A39684;
      opacity: 0.5;
      pointer-events: none;
      cursor: default;
    }
    .cm-dot-ring {
      position: absolute;
      width: 100%; height: 100%;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.14;
      transform: scale(0.55);
      transition: transform 260ms cubic-bezier(.2,.8,.2,1),
                  opacity   260ms ease;
    }
    .cm-dot-core {
      position: relative;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      box-shadow:
        0 0 0 0.5px rgba(26, 24, 20, 0.45),
        0 1.5px 3px rgba(26, 24, 20, 0.22);
      transition: transform 220ms cubic-bezier(.2,.8,.2,1),
                  box-shadow 220ms ease;
    }
    .cm-dot--featured .cm-dot-core {
      width: 10px; height: 10px;
      box-shadow:
        0 0 0 1px  rgba(200, 152, 58, 0.55),
        0 0 10px   rgba(200, 152, 58, 0.55),
        0 1.5px 3px rgba(26, 24, 20, 0.18);
    }
    .cm-dot--dim .cm-dot-core {
      width: 5px; height: 5px;
      box-shadow: 0 0 0 0.5px rgba(26, 24, 20, 0.25);
    }
    .cm-dot:hover .cm-dot-ring   { transform: scale(1.4); opacity: 0.32; }
    .cm-dot:hover .cm-dot-core   { transform: scale(1.35); }
    .cm-dot--selected .cm-dot-ring {
      transform: scale(1.75);
      opacity: 0.5;
      animation: cmDotSelectedPulse 2.2s ease-in-out infinite;
    }
    .cm-dot--selected .cm-dot-core {
      transform: scale(1.4);
      box-shadow:
        0 0 0 1.5px #1A1814,
        0 0 0 3px rgba(246, 242, 235, 0.95),
        0 3px 8px rgba(26, 24, 20, 0.28);
    }
    .cm-dot--featured.cm-dot--selected .cm-dot-core {
      box-shadow:
        0 0 0 1.5px #C8983A,
        0 0 0 3px rgba(246, 242, 235, 0.95),
        0 0 14px rgba(200, 152, 58, 0.6),
        0 3px 8px rgba(26, 24, 20, 0.22);
    }
    @keyframes cmDotSelectedPulse {
      0%, 100% { opacity: 0.5; transform: scale(1.75); }
      50%      { opacity: 0.75; transform: scale(2.0); }
    }

    /* ── Hover label / tooltip ─────────────────────────────────── */
    .cm-tooltip {
      background: #1A1814 !important;
      color: #F6F2EB !important;
      border: none !important;
      box-shadow:
        0 10px 28px rgba(26, 24, 20, 0.24),
        0 2px 6px   rgba(26, 24, 20, 0.12) !important;
      padding: 7px 11px 8px !important;
      font-family: 'Work Sans', sans-serif !important;
      font-size: 11.5px !important;
      line-height: 1.35;
      border-radius: 5px !important;
      font-weight: 500;
      letter-spacing: 0.1px;
      white-space: nowrap;
      transform-origin: bottom center;
      animation: cmTipIn 180ms cubic-bezier(.2,.8,.2,1);
    }
    /* No tail — clean floating pill, matches the mockup's tooltip. */
    .cm-tooltip::before,
    .cm-tooltip.leaflet-tooltip-top::before,
    .cm-tooltip.leaflet-tooltip-bottom::before,
    .cm-tooltip.leaflet-tooltip-left::before,
    .cm-tooltip.leaflet-tooltip-right::before {
      display: none !important;
      border: none !important;
    }
    @keyframes cmTipIn {
      from { opacity: 0; transform: translateY(4px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }
    .cm-tooltip .cm-year {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.4px;
      margin-right: 8px;
      padding: 1px 6px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.09);
      color: rgba(246, 242, 235, 0.92);
      vertical-align: 1px;
    }
    .cm-tooltip .cm-year--featured {
      background: rgba(200, 152, 58, 0.18);
      color: #E2BE73;
    }
    .cm-tooltip .cm-title { font-weight: 500; }
    .cm-tooltip .cm-meta {
      display: block;
      margin-top: 3px;
      font-size: 9.5px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      opacity: 0.55;
    }

    /* "You are here" marker — pulsing ring + solid dot. */
    .cm-near { background: transparent; border: none; }
    .cm-near-pulse {
      position: absolute; inset: -10px;
      border-radius: 50%;
      background: #1F5963;
      opacity: 0.22;
      animation: cmPulse 1.8s ease-out infinite;
    }
    .cm-near-dot {
      position: absolute; left: 50%; top: 50%;
      width: 14px; height: 14px; margin: -7px 0 0 -7px;
      border-radius: 50%;
      background: #1F5963;
      border: 2px solid #FFFFFF;
      box-shadow: 0 2px 6px rgba(26, 24, 20, 0.25);
    }
    @keyframes cmPulse {
      0%   { transform: scale(0.6); opacity: 0.28; }
      100% { transform: scale(1.4); opacity: 0;    }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="cleveland-map.jsx?v=leaflet2"></script>
  <script type="text/babel" src="desktop-landing.jsx?v=brand1"></script>

  <script type="text/babel" data-presets="env,react">
    (async () => {
      try {
        const res = await fetch('data/tier3-all/records.json');
        if (res.ok) {
          const records = await res.json();
          const n = window.loadHarvestedPhotos(records);
          console.log(`[harvest] loaded ${n} ContentDM records into ALL_PHOTOS`);
        } else {
          console.warn('[harvest] records.json not found; rendering mock data only');
        }
      } catch (err) {
        console.warn('[harvest] fetch failed:', err.message);
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<DesktopLanding />);
    })();
  </script>
</body>
</html>
