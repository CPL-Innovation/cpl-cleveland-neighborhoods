<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cleveland Neighborhoods — Enrichment (Staff MVP)</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0; padding: 0;
      background: #F6F2EB;
      font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #1A1814;
      height: 100%;
    }
    #root { height: 100vh; }
    textarea:focus, input:focus, select:focus {
      border-color: #1F5963 !important;
      box-shadow: 0 0 0 3px rgba(31,89,99,0.12);
    }
  </style>

  <!-- React -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Shell + screens -->
  <script type="text/babel" src="staff-shell.jsx"></script>
  <script type="text/babel" src="staff-home.jsx"></script>
  <script type="text/babel" src="staff-record-edit.jsx"></script>
  <script type="text/babel" src="staff-photos-list.jsx"></script>
  <script type="text/babel" src="staff-story-author.jsx"></script>

  <!-- Ingest · Scan pipeline surfaces (scan-pipeline defines window.scanApi; load it first) -->
  <script type="text/babel" src="scan-pipeline.jsx"></script>
  <script type="text/babel" src="scan-review.jsx"></script>
  <script type="text/babel" src="scan-accuracy.jsx"></script>

  <!-- App router (must load last — references the screen components) -->
  <script type="text/babel" src="staff-app.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    ReactDOM.createRoot(document.getElementById('root')).render(<StaffApp />);
  </script>
</body>
</html>
